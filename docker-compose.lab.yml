services:
  redroid:
    image: redroid/redroid:14.0.0-latest
    container_name: redroid
    privileged: true
    ports:
      - "5555:5555"
    volumes:
      - redroid-data:/data
    command:
      - androidboot.redroid_width=720
      - androidboot.redroid_height=1280
      - androidboot.redroid_dpi=320
      - androidboot.redroid_gpu_mode=guest
      - androidboot.use_memfd=1
    networks:
      - lab
    restart: unless-stopped

  mitmproxy:
    image: mitmproxy/mitmproxy
    container_name: mitmproxy
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./mitmproxy-addon.py:/addon.py
      - ./capture:/capture
      - mitmproxy-ca:/home/mitmproxy/.mitmproxy
    command: >
      mitmdump
      --listen-host 0.0.0.0
      --listen-port 8080
      --mode regular
      -s /addon.py
      --set hard_size_limit=0
    networks:
      - lab
    restart: unless-stopped

networks:
  lab:
    driver: bridge

volumes:
  redroid-data:
  mitmproxy-ca:
