services:
  scraper:
    build: .
    container_name: playwright-scraper
    env_file:
      - .env
    ports:
      - "8080:8080"
    init: true
    ipc: host
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
